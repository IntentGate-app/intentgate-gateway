<svg viewBox="0 0 960 540" width="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" role="img">
  <title>IntentGate — Request Pipeline</title>
  <desc>What happens inside the IntentGate gateway on every tools/call. Four sequential checks (capability, intent, policy, budget) plus an opt-in fifth check (memory provenance) between intent and policy. Each check has its own typed JSON-RPC failure code and its own audit event. Policy alone can escalate to a human approver.</desc>

  <!-- Background -->
  <rect width="960" height="540" fill="#ffffff"/>

  <!-- Title block -->
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">
    IntentGate — Request Pipeline
  </text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#475569">
    What runs on every tools/call · four sequential checks + opt-in fifth · one typed failure code per check
  </text>
  <text x="480" y="74" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">
    Provenance shown dashed because opt-in (default off) — when disabled, the node is a transparent pass-through
  </text>

  <!-- Divider -->
  <line x1="40" y1="94" x2="920" y2="94" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Request box at top -->
  <rect x="380" y="115" width="200" height="56" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="480" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">tools/call request</text>
  <text x="480" y="153" text-anchor="middle" font-size="10" font-family="ui-monospace, Menlo, monospace" fill="#475569">+ Bearer token + X-Intent-Prompt</text>
  <text x="480" y="166" text-anchor="middle" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#64748b">+ X-Intent-Memory-Provenance (if enabled)</text>

  <!-- Arrow down to checks row -->
  <line x1="480" y1="173" x2="480" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============== CHECK ROW (horizontal) ============== -->

  <!-- Check 1: Capability -->
  <rect x="40" y="210" width="140" height="80" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="110" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#064e3b">1. Capability</text>
  <text x="110" y="250" text-anchor="middle" font-size="9" fill="#047857">valid token? tool allowed?</text>
  <text x="110" y="276" text-anchor="middle" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#7c2d12">fail: -32010</text>

  <!-- pass arrow → Intent -->
  <line x1="185" y1="250" x2="205" y2="250" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Check 2: Intent -->
  <rect x="210" y="210" width="140" height="80" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="280" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#064e3b">2. Intent</text>
  <text x="280" y="250" text-anchor="middle" font-size="9" fill="#047857">tool in extracted intent?</text>
  <text x="280" y="276" text-anchor="middle" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#7c2d12">fail: -32011</text>

  <!-- pass arrow → Provenance -->
  <line x1="355" y1="250" x2="375" y2="250" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Check 3: Provenance (dashed, opt-in) — width shrunk 160->130 so
       the "pass / disabled" labels in the arrow gap have ~15px margin
       from both this box's right border and the Policy box's left border. -->
  <rect x="380" y="205" width="130" height="90" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="445" y="227" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Memory provenance</text>
  <text x="445" y="241" text-anchor="middle" font-size="9" font-weight="600" font-style="italic" fill="#b91c1c">opt-in, default off</text>
  <text x="445" y="261" text-anchor="middle" font-size="9" fill="#991b1b">HMAC envelopes valid?</text>
  <text x="445" y="274" text-anchor="middle" font-size="9" fill="#991b1b">hash chain intact?</text>
  <text x="445" y="287" text-anchor="middle" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#7c2d12">fail: -32014</text>

  <!-- pass / disabled arrow → Policy. Centered at x=540, midway between
       this box's right edge (x=510) and Policy's left edge (x=570). -->
  <line x1="515" y1="250" x2="565" y2="250" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="540" y="240" text-anchor="middle" font-size="8" fill="#475569" font-style="italic">pass /</text>
  <text x="540" y="266" text-anchor="middle" font-size="8" fill="#475569" font-style="italic">disabled</text>

  <!-- Check 4: Policy -->
  <rect x="570" y="210" width="140" height="80" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="640" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#064e3b">3. Policy</text>
  <text x="640" y="250" text-anchor="middle" font-size="9" fill="#047857">Rego: allow / block / esc?</text>
  <text x="640" y="276" text-anchor="middle" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#7c2d12">fail: -32012</text>

  <!-- pass arrow → Budget -->
  <line x1="715" y1="250" x2="735" y2="250" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Check 5: Budget -->
  <rect x="740" y="210" width="140" height="80" rx="6" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="810" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#064e3b">4. Budget</text>
  <text x="810" y="250" text-anchor="middle" font-size="9" fill="#047857">under max_calls cap?</text>
  <text x="810" y="276" text-anchor="middle" font-size="9" font-family="ui-monospace, Menlo, monospace" fill="#7c2d12">fail: -32013</text>

  <!-- pass arrow → Forward -->
  <line x1="885" y1="250" x2="905" y2="250" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Forward (off to the right, but tight) — wrap on next row for clarity -->

  <!-- ============== FAIL ARROWS (down from each check) ============== -->
  <!-- Capability fail arrow -->
  <line x1="110" y1="295" x2="110" y2="370" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
  <!-- Intent fail arrow -->
  <line x1="280" y1="295" x2="280" y2="370" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
  <!-- Provenance fail arrow -->
  <line x1="445" y1="300" x2="445" y2="370" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
  <!-- Policy fail OR escalate arrows -->
  <line x1="620" y1="295" x2="620" y2="370" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>
  <text x="606" y="338" text-anchor="end" font-size="8" fill="#7c2d12" font-style="italic">block</text>
  <line x1="660" y1="295" x2="660" y2="425" stroke="#d97706" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrowAmber)"/>
  <text x="673" y="338" text-anchor="start" font-size="8" fill="#92400e" font-style="italic">escalate</text>
  <!-- Budget fail arrow -->
  <line x1="810" y1="295" x2="810" y2="370" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="3 2" marker-end="url(#arrowRed)"/>

  <!-- ============== TERMINAL ROW ============== -->

  <!-- Block (wide bar capturing all four failure arrows) -->
  <rect x="40" y="375" width="700" height="44" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="390" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Block — typed JSON-RPC error</text>
  <text x="390" y="410" text-anchor="middle" font-size="10" fill="#991b1b">audit row emitted naming the failed check · downstream consumers can branch on the error code</text>

  <!-- Escalate node (off to the right of Block) -->
  <rect x="585" y="430" width="170" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="670" y="450" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Pause for approval</text>
  <text x="670" y="467" text-anchor="middle" font-size="9" fill="#b45309">human operator decides via /approvals</text>

  <!-- Forward (right side, distinct success terminal) -->
  <rect x="760" y="375" width="160" height="44" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="840" y="394" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">Forward to toolserver</text>
  <text x="840" y="410" text-anchor="middle" font-size="9" fill="#047857">happy path · audit row emitted</text>

  <!-- arrow from Budget pass to Forward -->
  <line x1="905" y1="250" x2="905" y2="370" stroke="#10b981" stroke-width="1.5"/>

  <!-- ============== FOOTER ============== -->
  <line x1="40" y1="495" x2="920" y2="495" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="518" font-size="10" font-weight="700" fill="#0f172a">Defends:</text>
  <text x="115" y="518" font-size="10" fill="#334155">
    (1) stolen credentials  ·  (2) prompt injection  ·  (3) memory poisoning (AAI03, opt-in)  ·  (4) over-broad permissions  ·  (5) runaway loops / cost spikes
  </text>

  <!-- Marker definitions -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
  </defs>
</svg>
